<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Barcode & QR Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <!-- Menggunakan versi yang lebih stabil untuk QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .canvas-container canvas {
            max-width: 100%;
            height: auto !important;
            margin: 0 auto;
            display: block;
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">Code Generator</h1>
            <p class="text-slate-600">Buat Barcode dan QR Code secara instan, gratis, dan aman.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Sidebar Controls -->
            <div class="md:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4 text-slate-800">Pengaturan</h2>
                    
                    <div class="space-y-4">
                        <!-- Tipe -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Pilih Jenis</label>
                            <select id="codeType" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <option value="qr">QR Code</option>
                                <option value="CODE128">Barcode (CODE128)</option>
                                <option value="EAN13">Barcode (EAN-13)</option>
                                <option value="CODE39">Barcode (CODE39)</option>
                            </select>
                        </div>

                        <!-- Warna -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Warna Kode</label>
                            <input type="color" id="fgColor" value="#000000" class="w-full h-10 p-1 bg-slate-50 border border-slate-300 rounded-lg cursor-pointer">
                        </div>

                        <!-- Ukuran -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Skala / Ukuran</label>
                            <input type="range" id="scale" min="1" max="10" value="4" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Workspace -->
            <div class="md:col-span-2 space-y-6">
                <!-- Input Area -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <label class="block text-sm font-medium text-slate-700 mb-2">Konten / Teks</label>
                    <textarea id="contentInput" rows="3" class="w-full p-4 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Masukkan URL atau angka di sini..."></textarea>
                    
                    <div class="mt-4 flex flex-wrap gap-3">
                        <button onclick="generateCode()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                            Generate
                        </button>
                    </div>
                </div>

                <!-- Preview Area -->
                <div id="previewContainer" class="bg-white p-10 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center justify-center min-h-[300px] relative overflow-hidden">
                    <div id="placeholder" class="text-slate-400 flex flex-col items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mb-4"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 7h.01"/><path d="M17 7h.01"/><path d="M7 17h.01"/><path d="M17 17h.01"/></svg>
                        <p>Preview akan muncul di sini</p>
                    </div>
                    
                    <div class="canvas-container hidden" id="resultWrapper">
                        <div class="flex justify-center bg-white p-4 rounded-lg">
                            <canvas id="canvas"></canvas>
                        </div>
                    </div>

                    <div id="actionButtons" class="hidden mt-8 w-full flex gap-3">
                        <button onclick="downloadImage()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>
                            Unduh Gambar
                        </button>
                        <button onclick="copyToClipboard()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                            Salin
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 right-5 bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl transform translate-y-20 transition-transform duration-300 flex items-center gap-2 z-50">
        <span id="toastMsg">Berhasil!</span>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const contentInput = document.getElementById('contentInput');
        const codeType = document.getElementById('codeType');
        const fgColor = document.getElementById('fgColor');
        const scaleInput = document.getElementById('scale');
        
        const resultWrapper = document.getElementById('resultWrapper');
        const placeholder = document.getElementById('placeholder');
        const actionButtons = document.getElementById('actionButtons');

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('translate-y-20');
            setTimeout(() => {
                toast.classList.add('translate-y-20');
            }, 3000);
        }

        function prepareCanvas() {
            // Bersihkan konten canvas sebelumnya
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.removeAttribute('style');
            
            // Tampilkan wrapper terlebih dahulu agar library bisa menghitung dimensi
            placeholder.classList.add('hidden');
            resultWrapper.classList.remove('hidden');
        }

        function generateCode() {
            const text = contentInput.value.trim();
            if (!text) {
                showToast("Silakan masukkan teks atau angka!");
                return;
            }

            const type = codeType.value;
            const color = fgColor.value;
            const scale = parseInt(scaleInput.value);

            // Sembunyikan tombol aksi saat memproses
            actionButtons.classList.add('hidden');

            try {
                if (type === 'qr') {
                    prepareCanvas();
                    generateQR(text, color, scale);
                } else {
                    // Validasi awal untuk Barcode tertentu
                    if (type === 'EAN13' && !/^\d{12,13}$/.test(text)) {
                        throw new Error("EAN-13 memerlukan 12-13 angka.");
                    }
                    if (type === 'CODE39' && !/^[0-9A-Z\-\.\ \$\/\+\%]+$/.test(text.toUpperCase())) {
                        throw new Error("Input mengandung karakter yang tidak didukung CODE39.");
                    }

                    prepareCanvas();
                    generateBarcode(text, type, color, scale);
                }
            } catch (err) {
                console.error("Kesalahan pembuatan:", err);
                // Kembalikan ke tampilan awal jika gagal
                resultWrapper.classList.add('hidden');
                placeholder.classList.remove('hidden');
                showToast(err.message || "Gagal membuat kode. Periksa format input.");
            }
        }

        function generateQR(text, color, scale) {
            // Pastikan library QRCode tersedia (mendukung pengecekan lowercase/uppercase)
            const qrLib = window.QRCode || window.qrcode;
            
            if (!qrLib) {
                showToast("Library QR Code gagal dimuat. Mohon muat ulang halaman.");
                resultWrapper.classList.add('hidden');
                placeholder.classList.remove('hidden');
                return;
            }

            qrLib.toCanvas(canvas, text, {
                width: scale * 60,
                margin: 2,
                color: {
                    dark: color,
                    light: '#ffffff'
                }
            }, function (error) {
                if (error) {
                    showToast("Teks terlalu panjang untuk QR Code.");
                    resultWrapper.classList.add('hidden');
                    placeholder.classList.remove('hidden');
                } else {
                    displayResult();
                }
            });
        }

        function generateBarcode(text, format, color, scale) {
            if (typeof JsBarcode === 'undefined') {
                showToast("Library Barcode gagal dimuat.");
                return;
            }

            JsBarcode(canvas, text, {
                format: format,
                lineColor: color,
                width: (scale / 2) + 0.5,
                height: 100,
                displayValue: true,
                fontSize: 14,
                background: "#ffffff",
                valid: function(valid) {
                    if (valid) {
                        displayResult();
                    } else {
                        // Secara teknis ini ditangani oleh validasi manual sebelumnya, 
                        // tapi tetap ditambahkan sebagai pengaman.
                        showToast("Format input tidak sesuai dengan jenis barcode.");
                        resultWrapper.classList.add('hidden');
                        placeholder.classList.remove('hidden');
                    }
                }
            });
        }

        function displayResult() {
            resultWrapper.classList.remove('hidden');
            actionButtons.classList.remove('hidden');
        }

        function downloadImage() {
            try {
                const link = document.createElement('a');
                link.download = `code-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast("Gambar berhasil diunduh.");
            } catch (e) {
                showToast("Gagal mengunduh gambar.");
            }
        }

        function copyToClipboard() {
            if (!navigator.clipboard || !window.ClipboardItem) {
                showToast("Fitur salin tidak didukung di browser ini.");
                return;
            }

            canvas.toBlob(blob => {
                if (!blob) {
                    showToast("Gagal memproses gambar.");
                    return;
                }
                try {
                    const data = [new ClipboardItem({ [blob.type]: blob })];
                    navigator.clipboard.write(data).then(() => {
                        showToast("Berhasil disalin ke clipboard!");
                    }).catch(err => {
                        console.error("Gagal menyalin:", err);
                        showToast("Gagal menyalin. Gunakan tombol unduh.");
                    });
                } catch (err) {
                    showToast("Gagal menyalin gambar.");
                }
            });
        }
    </script>
</body>
</html>
